
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid var(--tg-theme-hint-color, #ccc);
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 14px;
            background-color: var(--tg-theme-button-color, #40a7e3);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:active {
            opacity: 0.7;
        }
        .warning {
            color: var(--tg-theme-destructive-text-color, #ff3b30);
            margin: 20px 0;
            padding: 10px;
            border: 1px solid var(--tg-theme-destructive-text-color, #ff3b30);
            border-radius: 8px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Подтверждение перехода</h1>
        <p>Для продолжения введите код подтверждения</p>
        
        <div class="warning" id="warning">
            Неверный код. Попробуйте снова.
        </div>
        
        <input type="text" id="codeInput" placeholder="Введите 5-значный код" maxlength="5" pattern="[0-9]{5}" inputmode="numeric">
        
        <button id="submitBtn">Подтвердить</button>
    </div>

    <script>
        // Дожидаемся полной загрузки страницы
        document.addEventListener('DOMContentLoaded', function() {
            
            // Проверяем, доступен ли Telegram WebApp API
            if (window.Telegram && window.Telegram.WebApp) {
                console.log("✅ Telegram WebApp API доступен");
                
                // ОБЯЗАТЕЛЬНО вызываем ready()
                window.Telegram.WebApp.ready();
                
                // Раскрываем на весь экран
                window.Telegram.WebApp.expand();
                
                console.log("✅ WebApp готов");
            } else {
                console.error("❌ Telegram WebApp API НЕ доступен");
                alert("Ошибка: Telegram WebApp API не загружен");
            }
            
            // Получаем элементы
            const submitBtn = document.getElementById('submitBtn');
            const codeInput = document.getElementById('codeInput');
            const warning = document.getElementById('warning');
            
            // Проверяем, что элементы найдены
            if (!submitBtn || !codeInput) {
                console.error("❌ Элементы не найдены");
                return;
            }
            
            // Добавляем обработчик клика
            submitBtn.addEventListener('click', function() {
                console.log("✅ Кнопка нажата");
                
                const code = codeInput.value;
                
                if (code && code.length === 5) {
                    console.log("✅ Код введен:", code);
                    
                    // Здесь будет отправка на сервер
                    alert("Код принят: " + code);
                    
                    // Показываем предупреждение (имитация ошибки)
                    warning.style.display = 'block';
                    codeInput.value = '';
                } else {
                    alert("Введите 5-значный код");
                }
            });

    </script>
</body>
</html>
